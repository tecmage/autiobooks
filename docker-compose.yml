services:
  autiobooks:
    build: .
    container_name: autiobooks
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      # X11 socket for GUI display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Persist settings between runs
      - autiobooks-config:/root/.autiobooks
      # Mount a local directory for epub input / audiobook output
      - ./books:/books
    # GPU support (requires NVIDIA GPU + nvidia-container-toolkit)
    #deploy:
      #resources:
        #reservations:
          #devices:
            #- driver: nvidia
              #count: 1
              #capabilities: [gpu]

volumes:
  autiobooks-config:
