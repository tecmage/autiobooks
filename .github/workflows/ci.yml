name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Compile all Python files
      run: |
        python -m py_compile autiobooks/*.py
        python -m py_compile autiobooks/__main__.py

    - name: Check imports resolve
      run: |
        python -c "
        import autiobooks.autiobooks
        import autiobooks.engine
        import autiobooks.epub_parser
        import autiobooks.text_processing
        import autiobooks.config
        import autiobooks.voices_lang
        print('All imports successful')
        "
